<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" role="img" aria-labelledby="title desc">
  <title id="title">Premature ventricular contractions rhythm strip</title>
  <desc id="desc">A sinus rhythm strip with early wide ventricular beats and compensatory pauses.</desc>
  <defs>
    <pattern id="smallGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#edf3f7" stroke-width="1"/>
    </pattern>
    <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="url(#smallGrid)"/>
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#d8e4ec" stroke-width="2"/>
    </pattern>
  </defs>
  <rect width="900" height="260" rx="18" fill="#ffffff"/>
  <rect x="16" y="16" width="868" height="228" rx="14" fill="url(#grid)" stroke="#17202a" stroke-width="3"/>
  <path d="M 30 132
    L 72 132 L 82 118 L 92 132 L 120 132 L 126 96 L 134 172 L 143 132 L 178 132 L 205 114 L 232 132
    L 294 132 L 304 118 L 314 132 L 340 132 L 346 96 L 354 172 L 363 132 L 398 132 L 424 116 L 450 132
    L 462 132 L 472 176 L 492 54 L 520 205 L 548 128
    L 640 132 L 650 118 L 660 132 L 688 132 L 694 96 L 702 172 L 711 132 L 746 132 L 772 114 L 800 132
    L 814 132 L 824 178 L 844 58 L 872 205 L 888 132"
    fill="none" stroke="#0b8f83" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 454 216 C 500 236 546 236 594 216" fill="none" stroke="#d85f4f" stroke-width="5" stroke-linecap="round" stroke-dasharray="8 10"/>
  <text x="38" y="44" fill="#17202a" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="800">PVCs: early wide beats + pause</text>
</svg>
