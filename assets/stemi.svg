<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" role="img" aria-labelledby="title desc">
  <title id="title">ST elevation myocardial infarction ECG strip</title>
  <desc id="desc">A rhythm strip showing elevated ST segments after QRS complexes.</desc>
  <defs>
    <pattern id="smallGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#edf3f7" stroke-width="1"/>
    </pattern>
    <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="url(#smallGrid)"/>
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#d8e4ec" stroke-width="2"/>
    </pattern>
  </defs>
  <rect width="900" height="260" rx="18" fill="#ffffff"/>
  <rect x="16" y="16" width="868" height="228" rx="14" fill="url(#grid)" stroke="#17202a" stroke-width="3"/>
  <path d="M 36 150 L 78 150 L 90 135 L 102 150 L 132 150 L 138 92 L 148 190 L 158 120 L 218 120 L 270 150
    L 328 150 L 340 135 L 352 150 L 382 150 L 388 92 L 398 190 L 408 120 L 468 120 L 520 150
    L 578 150 L 590 135 L 602 150 L 632 150 L 638 92 L 648 190 L 658 120 L 718 120 L 770 150
    L 828 150 L 840 135 L 852 150 L 874 150"
    fill="none" stroke="#bb3e35" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 160 120 L 218 120 M 410 120 L 468 120 M 660 120 L 718 120" stroke="#d85f4f" stroke-width="12" stroke-linecap="round" opacity="0.22"/>
  <line x1="34" y1="150" x2="874" y2="150" stroke="#17202a" stroke-width="3" stroke-dasharray="8 12" opacity="0.22"/>
  <text x="38" y="44" fill="#17202a" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="800">STEMI: ST elevation after the QRS</text>
</svg>
